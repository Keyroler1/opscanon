name: OpsCanon
description: Audit repo readiness and build verified operating knowledge for AI agents.
author: OpsCanon

inputs:
  path:
    description: Repository path to audit.
    required: false
    default: .
  out:
    description: Directory for OpsCanon report artifacts.
    required: false
    default: opscanon-artifacts
  comment:
    description: Post a PR comment when GitHub token and PR context are available.
    required: false
    default: "false"
  github-token:
    description: Token used for optional PR comments.
    required: false
    default: ""
  llm:
    description: Run optional OpenAI synthesis when OPENAI_API_KEY is present.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install OpsCanon action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci

    - name: Build OpsCanon action
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build

    - name: Run OpsCanon
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        args=(ci "${{ inputs.path }}" --out "${{ inputs.out }}")
        if [ "${{ inputs.comment }}" = "true" ]; then
          args+=(--comment)
        fi
        if [ "${{ inputs.llm }}" = "true" ]; then
          args+=(--llm)
        fi
        node "${{ github.action_path }}/dist/cli.js" "${args[@]}"

    - name: Upload OpsCanon artifacts
      uses: actions/upload-artifact@v6
      with:
        name: opscanon-report
        path: ${{ inputs.out }}
