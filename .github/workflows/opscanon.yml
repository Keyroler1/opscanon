name: OpsCanon

on:
  pull_request:
  workflow_dispatch:

jobs:
  opscanon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: .
          out: opscanon-artifacts
          comment: "false"
